<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jump</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #050510; 
            overflow: hidden; 
            touch-action: none; 
            font-family: sans-serif; 
        }
        canvas { display: block; }
        
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #fff; 
            font-size: 20px; 
            text-shadow: 0 0 10px #0ff; 
            z-index: 10; 
            pointer-events: none; 
        }
        #score { color: #0ff; font-weight: bold; font-size: 28px; }
        #best { color: #ff0; font-size: 16px; }

        #gameOver {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 16, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            color: #fff;
            text-align: center;
        }
        #gameOver h1 {
            font-size: 48px;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055;
            margin: 0 0 20px 0;
            letter-spacing: 4px;
        }
        #gameOver .stats {
            font-size: 24px;
            margin: 10px 0;
            text-shadow: 0 0 10px #0ff;
        }
        #gameOver .stats span {
            color: #0ff;
            font-weight: bold;
            font-size: 32px;
        }
        #restartBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 30px;
            cursor: pointer;
            text-shadow: 0 0 10px #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #restartBtn:active {
            background: #0ff;
            color: #050510;
        }

        #startScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 16, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            color: #fff;
            text-align: center;
        }
        #startScreen h1 {
            font-size: 42px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            margin: 0 0 10px 0;
            letter-spacing: 4px;
        }
        #startScreen p {
            font-size: 18px;
            max-width: 300px;
            line-height: 1.5;
            opacity: 0.8;
        }
        #startBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 30px;
            cursor: pointer;
            text-shadow: 0 0 10px #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Счёт: <span id="score">0</span></div>
        <div id="best">🏆 Рекорд: <span id="bestScore">0</span></div>
    </div>

    <div id="startScreen">
        <h1>NEON JUMP</h1>
        <p>Уворачивайся от красных полос!<br>Тапай в любую точку — шар отскочит в противоположную сторону 🎯<br><br>💡 Шар внизу? Тапай сбоку — он подпрыгнет!</p>
        <button id="startBtn">▶ ИГРАТЬ</button>
    </div>

    <div id="gameOver">
        <h1>GAME OVER</h1>
        <div class="stats">Очки: <span id="finalScore">0</span></div>
        <div class="stats">🏆 Рекорд: <span id="finalBest">0</span></div>
        <button id="restartBtn">🔄 ИГРАТЬ СНОВА</button>
    </div>

    <canvas id="canvas"></canvas>

    <script src="https://st.max.ru/js/max-web-app.js"></script>
    
    <script>
        // 1. УМНАЯ ИНИЦИАЛИЗАЦИЯ MAX
        if (window.WebApp) {
            try {
                window.WebApp.expand(); 
                window.WebApp.setHeaderColor('#050510');
            } catch (e) {
                console.log("Тестируем вне MAX");
            }
        }

        // 2. НАСТРОЙКА ХОЛСТА
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 3. ИГРОВЫЕ ПЕРЕМЕННЫЕ
        let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 25, color: '#00ffff' };
        let particles = [];
        let obstacles = [];
        
        let score = 0;
        let bestScore = 0;
        let gameRunning = false;
        let gameStartTime = 0;
        let lastObstacleTime = 0;
        let lastScoreTime = 0;
        let obstacleInterval = 2000;
        let animationId = null;

        // Константы физики
        const IMPULSE_FORCE = 12;
        const GRAVITY = 0.3;
        const MAX_SPEED = 15;
        
        // НОВОЕ: Порог для "умного подскока" — нижняя треть экрана
        const FLOOR_THRESHOLD = 0.7; // 70% высоты экрана

        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const finalScoreEl = document.getElementById('finalScore');
        const finalBestEl = document.getElementById('finalBest');
        const gameOverScreen = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // 4. ЗАГРУЗКА РЕКОРДА
        function loadBestScore() {
            if (window.WebApp && window.WebApp.DeviceStorage) {
                try {
                    const saved = window.WebApp.DeviceStorage.getItem('bestScore');
                    if (saved) bestScore = parseInt(saved) || 0;
                } catch (e) {}
            } else {
                const saved = localStorage.getItem('bestScore');
                if (saved) bestScore = parseInt(saved) || 0;
            }
            bestScoreEl.innerText = bestScore;
        }

        // 5. СОХРАНЕНИЕ РЕКОРДА
        function saveBestScore() {
            if (score > bestScore) {
                bestScore = score;
                if (window.WebApp && window.WebApp.DeviceStorage) {
                    try {
                        window.WebApp.DeviceStorage.setItem('bestScore', String(bestScore));
                    } catch (e) {}
                } else {
                    localStorage.setItem('bestScore', String(bestScore));
                }
                bestScoreEl.innerText = bestScore;
            }
        }

        // 6. СТАРТ ИГРЫ
        function startGame() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = 0;
            ball.vy = 0;
            
            particles = [];
            obstacles = [];
            score = 0;
            gameRunning = true;
            gameStartTime = Date.now();
            lastObstacleTime = Date.now();
            lastScoreTime = Date.now();
            obstacleInterval = 2000;
            
            scoreEl.innerText = '0';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            if (animationId) cancelAnimationFrame(animationId);
            animate();
        }

        // 7. КОНЕЦ ИГРЫ
        function endGame() {
            gameRunning = false;
            saveBestScore();
            
            for (let i = 0; i < 50; i++) {
                createParticles(ball.x, ball.y, '#ff0055');
            }
            
            if (window.WebApp && window.WebApp.HapticFeedback) {
                try {
                    window.WebApp.HapticFeedback.notificationOccurred('error');
                } catch (e) {}
            }
            
            finalScoreEl.innerText = score;
            finalBestEl.innerText = bestScore;
            gameOverScreen.style.display = 'flex';
        }

        // 8. СОЗДАНИЕ ПРЕПЯТСТВИЯ
        function spawnObstacle() {
            const width = 80 + Math.random() * 120;
            const height = 15;
            const x = Math.random() * (canvas.width - width);
            
            obstacles.push({
                x: x,
                y: -height,
                width: width,
                height: height,
                speed: 3 + Math.random() * 2,
                color: '#ff0055',
                passed: false
            });
        }

        // 9. ПРОВЕРКА ПРЕПЯТСТВИЙ
        function checkObstacles() {
            for (let obs of obstacles) {
                const closestX = Math.max(obs.x, Math.min(ball.x, obs.x + obs.width));
                const closestY = Math.max(obs.y, Math.min(ball.y, obs.y + obs.height));
                const dx = ball.x - closestX;
                const dy = ball.y - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < ball.radius) {
                    endGame();
                    return;
                }
                
                if (!obs.passed && obs.y > ball.y + ball.radius) {
                    obs.passed = true;
                    score += 1;
                    scoreEl.innerText = score;
                }
            }
        }

        // 10. ГЛАВНЫЙ ЦИКЛ ОТРИСОВКИ
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameRunning) {
                const now = Date.now();
                
                if (now - lastScoreTime >= 3000) {
                    score += 1;
                    scoreEl.innerText = score;
                    lastScoreTime = now;
                }

                obstacleInterval = Math.max(700, 2000 - score * 15);

                if (now - lastObstacleTime > obstacleInterval) {
                    spawnObstacle();
                    lastObstacleTime = now;
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].y += obstacles[i].speed;
                    if (obstacles[i].y > canvas.height) {
                        obstacles.splice(i, 1);
                    }
                }

                ball.vy += GRAVITY; 
                
                ball.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, ball.vx));
                ball.vy = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, ball.vy));
                
                ball.x += ball.vx;
                ball.y += ball.vy;

                ball.vx *= 0.98;
                ball.vy *= 0.98;

                if (ball.y + ball.radius > canvas.height) {
                    ball.y = canvas.height - ball.radius;
                    ball.vy *= -0.5; 
                    createParticles(ball.x, ball.y, '#ff00ff');
                }
                if (ball.y - ball.radius < 0) {
                    ball.y = ball.radius;
                    ball.vy *= -0.5; 
                    createParticles(ball.x, ball.y, '#ffff00');
                }
                if (ball.x - ball.radius < 0) {
                    ball.x = ball.radius;
                    ball.vx *= -1;
                    createParticles(ball.x, ball.y, '#00ff00');
                }
                if (ball.x + ball.radius > canvas.width) {
                    ball.x = canvas.width - ball.radius;
                    ball.vx *= -1;
                    createParticles(ball.x, ball.y, '#ff8800');
                }

                checkObstacles();
            }

            for (let obs of obstacles) {
                ctx.fillStyle = obs.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;
            }

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 30; 
            ctx.shadowColor = ball.color;
            ctx.fill();
            ctx.shadowBlur = 0;

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${p.life})`;
                ctx.fill();
            }

            animationId = requestAnimationFrame(animate); 
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 4 + 2,
                    life: 1,
                    color: color
                });
            }
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        // 11. НОВОЕ УПРАВЛЕНИЕ: Умный подскок
        window.addEventListener('pointerdown', (e) => {
            if (!gameRunning) return;
            
            const tapX = e.clientX;
            const tapY = e.clientY;
            
            // Вектор ОТ точки тапа К шару (противоположное направление)
            const dx = ball.x - tapX;
            const dy = ball.y - tapY;
            
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < 10) {
                return;
            }
            
            const normalizedDx = dx / distance;
            const normalizedDy = dy / distance;
            
            // НОВОЕ: Проверяем, находится ли шар в нижней трети экрана
            const isNearFloor = ball.y > canvas.height * FLOOR_THRESHOLD;
            
            if (isNearFloor) {
                // Шар внизу — ВСЕГДА даём импульс вверх (подскок)
                ball.vy = -IMPULSE_FORCE;
                // Горизонтальное направление — по обычной логике
                ball.vx = normalizedDx * IMPULSE_FORCE;
                
                // Особые искры для подскока (белые, яркие)
                createParticles(ball.x, ball.y + ball.radius, '#ffffff');
            } else {
                // Обычная логика отскока
                ball.vx = normalizedDx * IMPULSE_FORCE;
                ball.vy = normalizedDy * IMPULSE_FORCE;
            }
            
            createParticles(ball.x, ball.y, '#00ffff'); 
            
            if (window.WebApp && window.WebApp.HapticFeedback) {
                try {
                    window.WebApp.HapticFeedback.impactOccurred('medium');
                } catch (e) {}
            }
        });

        // 12. КНОПКИ
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });
        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });

        // 13. ИНИЦИАЛИЗАЦИЯ
        loadBestScore();
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        animate();
    </script>
</body>
</html>
